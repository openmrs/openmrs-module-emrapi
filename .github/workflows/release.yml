name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 1.3.3)'
        required: true
      development_version:
        description: 'Next development version (e.g., 1.4.0-SNAPSHOT)'
        required: true

jobs:
  release:
    uses: openmrs/openmrs-contrib-gha-workflows/.github/workflows/release-backend-module.yml@main
    permissions:
      contents: write
    with:
      release_version: ${{ inputs.release_version }}
      development_version: ${{ inputs.development_version }}
      java_version: '8'
    secrets:
      MAVEN_REPO_USERNAME: ${{ secrets.MAVEN_REPO_USERNAME }}
      MAVEN_REPO_API_KEY: ${{ secrets.MAVEN_REPO_API_KEY }}
      # BOT_PAT is an optional GitHub Personal Access Token from a bot account
      # (e.g. openmrs-bot) with permission to push to protected branches.
      # The Maven release plugin pushes the release tag and the next-development-
      # version commit directly to the branch; the default GITHUB_TOKEN cannot
      # do this when branch-protection rules are enabled.  If BOT_PAT is not
      # configured the workflow falls back to GITHUB_TOKEN, which works fine
      # for repositories without push-protection rules on the release branch.
      BOT_PAT: ${{ secrets.BOT_PAT }}
